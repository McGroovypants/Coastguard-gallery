<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastguard 2026 Photo Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a1628; color: #fff; min-height: 100vh; }

/* LOGIN */
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%); padding: 20px; }
.login-logos { display: flex; align-items: center; gap: 30px; margin-bottom: 30px; }
.logo-bg { background: rgba(255,255,255,0.95); border-radius: 12px; padding: 12px 18px; display: flex; align-items: center; justify-content: center; }
.login-logos img { height: 70px; object-fit: contain; }
.login-divider { width: 2px; height: 50px; background: rgba(255,255,255,0.3); }
.login-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
.login-subtitle { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 30px; text-align: center; }
.login-box { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 30px; width: 100%; max-width: 380px; }
.login-box label { display: block; font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
.login-box input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; font-size: 15px; outline: none; }
.login-box input:focus { border-color: #e63329; }
.login-box button { width: 100%; padding: 12px; margin-top: 16px; border-radius: 8px; border: none; background: #e63329; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.login-box button:hover { background: #c42a22; }
.login-error { color: #ff6b6b; font-size: 13px; margin-top: 10px; display: none; }

/* HEADER */
.header { background: rgba(10,22,40,0.95); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
.header-logos { display: flex; align-items: center; gap: 16px; }
.header-logo-bg { background: rgba(255,255,255,0.95); border-radius: 8px; padding: 6px 10px; display: flex; align-items: center; justify-content: center; }
.header-logos img { height: 40px; object-fit: contain; }
.header-divider { width: 1px; height: 30px; background: rgba(255,255,255,0.2); }
.header-title { font-size: 18px; font-weight: 600; }
.credit { font-size: 12px; color: rgba(255,255,255,0.5); }

/* CATEGORIES */
.container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
.section-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px; }
.cat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; text-align: center; cursor: pointer; transition: all 0.2s; }
.cat-card:hover { background: rgba(255,255,255,0.1); border-color: #e63329; transform: translateY(-2px); }
.cat-card.active { border-color: #e63329; background: rgba(230,51,41,0.1); }
.cat-thumb { width: 100%; aspect-ratio: 16/10; overflow: hidden; }
.cat-thumb img { width: 100%; height: 100%; object-fit: cover; }
.cat-thumb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; aspect-ratio: 16/10; overflow: hidden; }
.cat-thumb-grid img { width: 100%; height: 100%; object-fit: cover; }
.cat-card-team .cat-thumb-grid img { object-position: top; }
.cat-icon { font-size: 36px; padding-top: 24px; margin-bottom: 10px; }
.cat-label { font-size: 16px; font-weight: 600; padding: 12px 12px 4px; }
.cat-count { font-size: 13px; color: rgba(255,255,255,0.5); padding: 0 12px 16px; }

/* GALLERY BAR */
.gallery-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.gallery-bar h2 { font-size: 20px; font-weight: 600; }
.back-btn, .download-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #fff; font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.back-btn:hover { background: rgba(255,255,255,0.1); }
.download-btn { background: #e63329; border-color: #e63329; }
.download-btn:hover { background: #c42a22; }

/* PHOTO GRID */
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.photo-thumb { aspect-ratio: 4/3; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; background: rgba(255,255,255,0.05); }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
.photo-grid.team-shots .photo-thumb { aspect-ratio: 3/4; }
.photo-grid.team-shots .photo-thumb img { object-position: top; }
.photo-thumb:hover img { transform: scale(1.05); }
.photo-thumb .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 13px; }

/* LIGHTBOX */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 4px; }
.lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; background: none; border: none; z-index: 1001; }
.lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); font-size: 32px; color: #fff; cursor: pointer; background: rgba(0,0,0,0.5); border: none; padding: 12px 16px; border-radius: 8px; z-index: 1001; }
.lightbox-nav.prev { left: 16px; }
.lightbox-nav.next { right: 16px; }
.lightbox-info { position: absolute; bottom: 20px; text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; }
.lightbox-download { display: inline-block; margin-top: 8px; padding: 6px 14px; background: #e63329; color: #fff; text-decoration: none; border-radius: 6px; font-size: 13px; }
.hidden { display: none !important; }

@media (max-width: 600px) {
  .login-logos { gap: 16px; }
  .login-logos img { height: 50px; }
  .cat-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .photo-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
</style>
</head>

const ACCESS_CODE = "cg26";
let currentCat = null;
let lightboxIndex = 0;

function tryLogin() {
  const code = document.getElementById("accessCode").value.trim().toLowerCase();
  if (code === ACCESS_CODE) {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("mainGallery").classList.remove("hidden");
    renderCategories();
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}
document.getElementById("accessCode").addEventListener("keydown", function(e) {
  if (e.key === "Enter") tryLogin();
});


function renderCategories() {
  const grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  categories.forEach(cat => {
    const card = document.createElement("div");
    card.className = cat.key === "team_shots" ? "cat-card cat-card-team" : "cat-card";
    const photos = photoData[cat.key] || [];
    if (photos.length >= 4) {
      card.innerHTML = `<div class="cat-thumb-grid">
        <img src="${photos[0].thumb}" alt="" loading="lazy">
        <img src="${photos[1].thumb}" alt="" loading="lazy">
        <img src="${photos[2].thumb}" alt="" loading="lazy">
        <img src="${photos[3].thumb}" alt="" loading="lazy">
      </div><div class="cat-label">${cat.label}</div><div class="cat-count">${cat.count} photos</div>`;
    } else if (photos.length > 0) {
      card.innerHTML = `<div class="cat-thumb"><img src="${photos[0].thumb}" alt="${cat.label}" loading="lazy"></div><div class="cat-label">${cat.label}</div><div class="cat-count">${cat.count} photos</div>`;
    } else {
      card.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-label">${cat.label}</div><div class="cat-count">${cat.count} photos</div>`;
    }
    card.onclick = () => openCategory(cat.key);
    grid.appendChild(card);
  });
}

function openCategory(key) {
  currentCat = key;
  const cat = categories.find(c => c.key === key);
  document.getElementById("categoryView").classList.add("hidden");
  document.getElementById("photoView").classList.remove("hidden");
  document.getElementById("photoViewTitle").textContent = cat.label;
  document.getElementById("folderDownloadBtn").href = cat.folderLink;
  
  const grid = document.getElementById("photoGrid");
  grid.className = key === "team_shots" ? "photo-grid team-shots" : "photo-grid";
  grid.innerHTML = "";
  const photos = photoData[key] || [];
  
  if (photos.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:rgba(255,255,255,0.4);"><p style="font-size:18px; margin-bottom:10px;">Photos loading soon</p><p>In the meantime, browse and download from Dropbox:</p><a href="' + cat.folderLink + '" target="_blank" style="color:#e63329;">Open Dropbox Folder</a></div>';
    return;
  }
  
  photos.forEach((photo, i) => {
    const thumb = document.createElement("div");
    thumb.className = "photo-thumb";
    thumb.innerHTML = `<div class="loading">Loading...</div><img src="${photo.thumb}" alt="${photo.name}" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.previousElementSibling.textContent='Failed to load'">`;
    thumb.onclick = () => openLightbox(key, i);
    grid.appendChild(thumb);
  });
}

function showCategories() {
  document.getElementById("categoryView").classList.remove("hidden");
  document.getElementById("photoView").classList.add("hidden");
  currentCat = null;
}

function openLightbox(catKey, index) {
  currentCat = catKey;
  lightboxIndex = index;
  updateLightbox();
  document.getElementById("lightbox").classList.add("open");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}

function navLightbox(dir) {
  const photos = photoData[currentCat] || [];
  lightboxIndex = (lightboxIndex + dir + photos.length) % photos.length;
  updateLightbox();
}

function updateLightbox() {
  const photos = photoData[currentCat] || [];
  const photo = photos[lightboxIndex];
  document.getElementById("lightboxImg").src = photo.url;
  document.getElementById("lightboxCaption").textContent = photo.name;
  document.getElementById("lightboxCounter").textContent = `${lightboxIndex + 1} of ${photos.length}`;
  const dlUrl = photo.url.replace("&raw=1", "&dl=1").replace("?raw=1", "?dl=1");
  document.getElementById("lightboxDownload").href = dlUrl;
}

document.addEventListener("keydown", function(e) {
  if (!document.getElementById("lightbox").classList.contains("open")) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") navLightbox(-1);
  if (e.key === "ArrowRight") navLightbox(1);
});

document.getElementById("lightbox").addEventListener("click", function(e) {
  if (e.target === this) closeLightbox();
});
</script>
